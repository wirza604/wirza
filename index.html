<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ 公式サイト</title>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; position: sticky; top: 0; background: white; z-index: 50; }
        .site-title { font-size: 24px; font-weight: bold; }
        .menu-btn { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-btn .line { width: 100%; height: 3px; background-color: #000000; }

        /* 全画面メニュー */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: opacity 0.5s ease; }
        .overlay.open { display: flex; opacity: 1; }
        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 50px; color: #ffffff; cursor: pointer; }
        .menu-item { display: block; color: #ffffff; text-decoration: none; font-size: 28px; font-weight: bold; margin: 20px 0; }
        .menu-item:hover { color: #ff0000; }

        /* 共通設定：セクションごとの間隔 */
        section { width: 100%; padding: 80px 0; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .section-title-large { font-size: 60px; font-weight: 900; font-style: italic; line-height: 1; display: block; }
        .section-title-sub { font-size: 20px; font-weight: bold; margin-bottom: 30px; }
        .content-placeholder { width: 90%; max-width: 1200px; min-height: 200px; border: 2px dashed rgba(255,255,255,0.3); display: flex; justify-content: center; align-items: center; color: #eee; font-weight: bold; }

        /* メイン動画エリア */
        .top-video { width: 98%; max-width: 1400px; aspect-ratio: 16 / 9; border: 5px solid #000; background: #000; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 【重要】各セクションの新しい色設定 */
        
        /* 1. ライブ（赤） */
        .bg-red { background-color: #ff0000; color: #ffffff; }

        /* 2. ビデオ（紫） */
        .bg-purple { background-color: #800080; color: #ffffff; }

        /* 3. イベント（黄色） */
        .bg-yellow { background-color: #ffd700; color: #000000; } /* 黄色は黒文字の方が見やすい */
        .bg-yellow .section-title-large, 
        .bg-yellow .section-title-sub, 
        .bg-yellow .content-placeholder { color: #000000; border-color: rgba(0,0,0,0.1); }

        /* 4. スケジュール（赤） */
        /* .bg-red を再利用します */

        /* 5. 視聴者参加型（オレンジ） */
        .bg-orange { background-color: #ff8c00; color: #ffffff; }
    </style>
</head>
<body>

    <header>
        <div class="site-title">ウィルザ公式サイト</div>
        <div class="menu-btn" onclick="toggleMenu()"><div class="line"></div><div class="line"></div><div class="line"></div></div>
    </header>

    <div class="overlay" id="overlay">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        <div class="menu-content">
            <a href="#" class="menu-item" onclick="toggleMenu()">ホーム</a>
            <a href="#live" class="menu-item" onclick="toggleMenu()">ライブ</a>
            <a href="#video" class="menu-item" onclick="toggleMenu()">動画</a>
            <a href="#event" class="menu-item" onclick="toggleMenu()">イベント</a>
            <a href="#schedule" class="menu-item" onclick="toggleMenu()">スケジュール</a>
            <a href="#entry" class="menu-item" onclick="toggleMenu()">視聴者参加型</a>
        </div>
    </div>

    <main style="display: flex; flex-direction: column; align-items: center;">
        <div class="top-video">
            <iframe src="https://www.youtube.com/embed/videoseries?list=UUv0uU7G0nS85Y2aN4P0o4rA" allowfullscreen></iframe>
        </div>

        <section id="live" class="bg-red">
            <span class="section-title-large">LIVE</span>
            <span class="section-title-sub">ライブ</span>
            <div class="content-placeholder">配信情報を準備中...</div>
        </section>

        <section id="video" class="bg-purple">
            <span class="section-title-large">VIDEO</span>
            <span class="section-title-sub">動画</span>
            <div class="content-placeholder">おすすめ動画を準備中...</div>
        </section>

        <section id="event" class="bg-yellow">
            <span class="section-title-large">EVENT</span>
            <span class="section-title-sub">イベント</span>
            <div class="content-placeholder">イベント情報を準備中...</div>
        </section>

        <section id="schedule" class="bg-red">
            <span class="section-title-large">SCHEDULE</span>
            <span class="section-title-sub">スケジュール</span>
            <div class="content-placeholder">今週の予定を準備中...</div>
        </section>

        <section id="entry" class="bg-orange">
            <span class="section-title-large">PLAY TOGETHER</span>
            <span class="section-title-sub">視聴者参加型</span>
            <div class="content-placeholder">参加方法を準備中...</div>
        </section>
    </main>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('overlay');
            if (overlay.classList.contains('open')) {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.classList.remove('open'); }, 500);
            } else {
                overlay.classList.add('open');
                setTimeout(() => { overlay.style.opacity = '1'; }, 10);
            }
        }
    </script>
</body>
</html>
