<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ 公式サイト</title>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; position: sticky; top: 0; background: white; z-index: 50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .site-title { font-size: 24px; font-weight: bold; }

        section { width: 100%; padding: 60px 0; display: flex; flex-direction: column; align-items: center; margin-bottom: 100px; }
        section:last-child { margin-bottom: 50px; }

        .section-header { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        .section-title-large { font-size: clamp(40px, 10vw, 65px); font-weight: 900; font-style: italic; line-height: 1; }
        .section-title-sub { font-size: 18px; font-weight: bold; }

        .view-all-btn {
            background-color: #ffffff; color: #000000; border: none; cursor: pointer;
            font-size: 13px; font-weight: bold; padding: 10px 22px; border-radius: 25px; 
            text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* ★ここがポイント：カードを並べるエリア */
        .content-area {
            width: 90%; max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* 最初から見えるカード */
        .card { 
            aspect-ratio: 16 / 9; background: rgba(255,255,255,0.15); 
            border: 2px solid rgba(255,255,255,0.4); border-radius: 12px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-weight: bold; font-size: 18px; text-align: center;
        }

        /* ★隠しエリア（VIEW ALLを押すと出る） */
        .more-content {
            grid-column: 1 / -1; /* 横いっぱいに広がる */
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-height: 0; overflow: hidden;
            transition: max-height 0.5s ease-out;
        }
        .more-content.show { max-height: 1000px; margin-top: 20px; }

        /* 各セクションの色 */
        .bg-red { background-color: #ff0000; color: #fff; }
        .bg-purple { background-color: #800080; color: #fff; }
        .bg-yellow { background-color: #ffd700; color: #000; }
        .bg-yellow .view-all-btn { background-color: #000; color: #fff; }
        .bg-yellow .card { border-color: rgba(0,0,0,0.2); }
        .bg-orange { background-color: #ff8c00; color: #fff; }

        /* トップ動画 */
        .top-video-link { width: 98%; max-width: 1400px; display: block; margin: 20px 0 100px 0; text-decoration: none; }
        .top-video { width: 100%; aspect-ratio: 16 / 9; border: 6px solid #000; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
        .click-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
    </style>
</head>
<body>

    <header>
        <div class="site-title">ウィルザ公式サイト</div>
    </header>

    <main style="display: flex; flex-direction: column; align-items: center;">
        
        <a href="https://www.youtube.com/@wirza-604/videos" target="_blank" class="top-video-link">
            <div class="top-video">
                <iframe src="https://www.youtube.com/embed/videoseries?list=UUv0uU7G0nS85Y2aN4P0o4rA"></iframe>
                <div class="click-overlay"></div>
            </div>
        </a>

        <section id="live" class="bg-red">
            <div class="section-header">
                <div><span class="section-title-large">LIVE</span><span class="section-title-sub">ライブ情報</span></div>
                <button class="view-all-btn" onclick="toggleSection('live-more')">VIEW ALL</button>
            </div>
            <div class="content-area">
                <div class="card">最新ライブ1</div>
                <div class="card">最新ライブ2</div>
                <div class="more-content" id="live-more">
                    <div class="card">過去ライブ3</div>
                    <div class="card">過去ライブ4</div>
                </div>
            </div>
        </section>

        <section id="event" class="bg-yellow">
            <div class="section-header">
                <div><span class="section-title-large">EVENT</span><span class="section-title-sub">イベント</span></div>
                <button class="view-all-btn" onclick="toggleSection('event-more')">VIEW ALL</button>
            </div>
            <div class="content-area">
                <div class="card">最新イベント1</div>
                <div class="card">最新イベント2</div>
                <div class="more-content" id="event-more">
                    <div class="card">過去イベント3</div>
                </div>
            </div>
        </section>

    </main>

    <script>
        function toggleSection(id) {
            const content = document.getElementById(id);
            const btn = event.currentTarget;
            content.classList.toggle('show');
            btn.innerText = content.classList.contains('show') ? "CLOSE" : "VIEW ALL";
        }
    </script>
</body>
</html>
