<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ 公式サイト</title>
    <style>
        /* 全体の設定 */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* ヘッダー（上の部分） */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
        }

        .site-title {
            font-size: 24px;
            font-weight: bold;
        }

        /* 三本線メニューボタン */
        .menu-btn {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 200; /* メニューより上に表示 */
        }

        .menu-btn .line {
            width: 100%;
            height: 3px;
            background-color: #000000;
            transition: all 0.3s ease; /* アニメーション用 */
        }

        /* メニューが開いた時の三本線の形（×にする） */
        .menu-btn.open .line:nth-child(1) {
            transform: translateY(8.5px) rotate(45deg);
        }
        .menu-btn.open .line:nth-child(2) {
            opacity: 0;
        }
        .menu-btn.open .line:nth-child(3) {
            transform: translateY(-8.5px) rotate(-45deg);
        }

        /* 全画面メニュー（オーバーレイ） */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95); /* 背景を黒く */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            
            /* 初期状態は非表示、アニメーション設定 */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease; /* 0.5秒で出入り */
        }

        /* メニューが開いた時の状態 */
        .overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* メニューの中身 */
        .menu-content {
            text-align: center;
        }

        /* メニュー項目（リンク） */
        .menu-item {
            display: block;
            color: #ffffff; /* 通常は白 */
            text-decoration: none;
            font-size: 32px;
            font-weight: bold;
            margin: 25px 0;
            transition: color 0.3s ease; /* 色の変化を滑らかに */
        }

        /* カーソルを合わせた時（ホバー） */
        .menu-item:hover {
            color: #ff0000; /* 赤になる */
        }

        /* メインコンテンツ（動画枠） */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        .video-placeholder {
            width: 80%;
            max-width: 800px;
            aspect-ratio: 16 / 9; /* 16:9の比率 */
            border: 4px solid #000000;
            background-color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888888;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <div class="site-title">ウィルザ公式サイト</div>
        <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </header>

    <div class="overlay" id="overlay">
        <div class="menu-content">
            <a href="#" class="menu-item">ライブ</a>
            <a href="event.html" class="menu-item">イベント</a>
            <a href="https://www.youtube.com/@wirza604" class="menu-item" target="_blank">動画</a>
            <a href="#" class="menu-item">スケジュール</a>
            <a href="#" class="menu-item">視聴者参加型</a> </div>
    </div>

    <main>
        <div class="video-placeholder">
             여기에 동영상을 배치 (YouTube 임베드 코드 예정)
        </div>
    </main>

    <script>
        function toggleMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const overlay = document.getElementById('overlay');
            
            // 'open'クラスをつけ外しして、アニメーションと表示を制御
            menuBtn.classList.toggle('open');
            overlay.classList.toggle('open');
        }
    </script>
</body>
</html>
