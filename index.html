<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ 公式サイト</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* ヘッダー部分（復活！） */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
        }
        .site-title {
            font-size: 24px;
            font-weight: bold;
        }
        .menu-btn {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }
        .menu-btn .line {
            width: 100%;
            height: 3px;
            background-color: #000000;
        }

        /* メニューの黒い画面 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .overlay.open {
            display: flex;
            opacity: 1;
        }
        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 50px;
            color: #ffffff;
            cursor: pointer;
        }
        .menu-item {
            display: block;
            color: #ffffff;
            text-decoration: none;
            font-size: 32px;
            font-weight: bold;
            margin: 25px 0;
            transition: color 0.3s ease;
        }
        .menu-item:hover {
            color: #ff0000;
        }

        /* メインエリア */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* 動画枠（限界まで大きく） */
        .video-container {
            width: 98%;
            max-width: 1400px;
            aspect-ratio: 16 / 9;
            border: 5px solid #000000;
            background-color: #000;
            margin-top: 20px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ライブセクション（赤いエリア） */
        .live-section {
            width: 100%;
            background-color: #ff0000;
            padding: 40px 0;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .live-header {
            width: 90%;
            max-width: 1200px;
            margin-bottom: 20px;
        }
        .live-title-large {
            font-size: 60px;
            font-weight: 900;
            color: #ffffff;
            font-style: italic;
            display: block;
            line-height: 1;
        }
        .live-title-sub {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            margin-left: 5px;
        }
        .live-content-area {
            width: 90%;
            max-width: 1200px;
            min-height: 200px;
            display: flex;
            justify-content: flex-start;
        }
    </style>
</head>
<body>

    <header>
        <div class="site-title">ウィルザ公式サイト</div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </header>

    <div class="overlay" id="overlay">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        <div class="menu-content">
            <a href="#" class="menu-item">ライブ</a>
            <a href="event.html" class="menu-item">イベント</a>
            <a href="https://www.youtube.com/@wirza604" class="menu-item" target="_blank">動画</a>
            <a href="#" class="menu-item">スケジュール</a>
            <a href="#" class="menu-item">視聴者参加型</a>
        </div>
    </div>

    <main>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/videoseries?list=UUv0uU7G0nS85Y2aN4P0o4rA" 
                title="YouTube video player" 
                allowfullscreen></iframe>
        </div>

        <div class="live-section">
            <div class="live-header">
                <span class="live-title-large">LIVE</span>
                <span class="live-title-sub">ライブ</span>
            </div>
            <div class="live-content-area">
                <p style="color: #ffffff; opacity: 0.5;">情報を準備中です...</p>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('overlay');
            if (overlay.classList.contains('open')) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.remove('open');
                }, 500);
            } else {
                overlay.classList.add('open');
                setTimeout(() => {
                    overlay.style.opacity = '1';
                }, 10);
            }
        }
    </script>
</body>
</html>
