<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ公式サイト | マイクラ実況・ダウンロード</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        /* ヘッダーの設定 */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 30px; 
            position: sticky; 
            top: 0; 
            background: white; 
            z-index: 150; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .site-title { font-size: 22px; font-weight: bold; margin: 0; }
        .site-title a { text-decoration: none; color: #000; }

        /* 三本線（ハンバーガーメニュー）のスタイル */
        .menu-btn { 
            width: 30px; 
            height: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            cursor: pointer; 
            z-index: 200;
        }
        .menu-btn .line { width: 100%; height: 3px; background-color: #000; transition: 0.3s; }

        /* メニューが開いた時の画面（オーバーレイ） */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0, 0, 0, 0.95); 
            display: none; justify-content: center; align-items: center; 
            z-index: 180; 
        }
        .menu-item { 
            display: block; color: #fff; text-decoration: none; 
            font-size: 32px; font-weight: bold; margin: 25px 0; 
            text-align: center;
        }

        /* セクション設定（ゆったり余白） */
        section { width: 100%; padding: 150px 0 100px 0; display: flex; flex-direction: column; align-items: center; }
        .section-header { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; }
        .section-title-large { font-size: clamp(40px, 10vw, 65px); font-weight: 900; font-style: italic; line-height: 1; margin: 0; }
        .bg-red { background-color: #ff0000; color: #fff; }
        .bg-purple { background-color: #800080; color: #fff; }
        .bg-green { background-color: #2e8b57; color: #fff; }
        .bg-orange { background-color: #ff8c00; color: #fff; }

        .content-area { width: 90%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .card { aspect-ratio: 16 / 9; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; text-decoration: none; color: inherit; transition: 0.3s; }

        /* 質問コーナー（モーダル） */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 300; }
        .modal-content { background-color: #1a1a1a; width: 85%; max-width: 700px; border-radius: 15px; padding: 40px; color: #fff; position: relative; }
        
        footer { background-color: #000; color: #fff; padding: 80px 20px; margin-top: 100px; }
        .footer-sns { display: flex; gap: 20px; font-size: 28px; }
        .footer-sns a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <!-- 左上の文字を「ウィルザ公式サイト」に変更 -->
        <h1 class="site-title"><a href="#">ウィルザ公式サイト</a></h1>
        <!-- 三本線ボタン -->
        <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </header>

    <!-- 三本線を押した時に出るメニュー -->
    <div class="overlay" id="menuOverlay">
        <nav>
            <a href="#live" class="menu-item" onclick="toggleMenu()">LIVE</a>
            <a href="#video" class="menu-item" onclick="toggleMenu()">VIDEO</a>
            <a href="#download" class="menu-item" onclick="toggleMenu()">DOWNLOAD</a>
            <a href="#schedule" class="menu-item" onclick="toggleMenu()">SCHEDULE</a>
            <div class="menu-item" onclick="toggleMenu()" style="color: #ff0000; cursor: pointer; margin-top: 50px;">CLOSE ×</div>
        </nav>
    </div>

    <main>
        <section id="live" class="bg-red">
            <div class="section-header">
                <h2><span style="font-size:18px; font-weight:bold; display:block;">ライブ配信</span><span class="section-title-large">LIVE</span></h2>
            </div>
            <div class="content-area"><div class="card">最新ライブ</div><div class="card">最新ライブ</div></div>
        </section>

        <section id="video" class="bg-purple">
            <div class="section-header">
                <h2><span style="font-size:18px; font-weight:bold; display:block;">おすすめ動画</span><span class="section-title-large">VIDEO</span></h2>
            </div>
            <div class="content-area"><div class="card">人気動画</div><div class="card">人気動画</div></div>
        </section>

        <section id="download" class="bg-green">
            <div class="section-header">
                <h2><span style="font-size:18px; font-weight:bold; display:block;">アドオン・配布物</span><span class="section-title-large">DOWNLOAD</span></h2>
            </div>
            <div class="content-area"><div class="card">アドオン</div><div class="card">ワールド</div></div>
        </section>

        <section id="schedule" class="bg-orange">
            <div class="section-header">
                <h2><span style="font-size:18px; font-weight:bold; display:block;">配信スケジュール</span><span class="section-title-large">SCHEDULE</span></h2>
            </div>
            <div class="content-area"><div class="card">今週の予定</div></div>
        </section>
    </main>

    <footer>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <div style="font-size: 28px; font-weight: 900;">WIRZA</div>
            <div class="footer-sns">
                <a href="https://www.youtube.com/@wirza-604" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://x.com/Wirza604" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.instagram.com/wirza604/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@wirza604" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
        <p style="text-align: center; margin-top: 40px;"><a onclick="openQA()" style="cursor:pointer; color:#ccc;">QA / 質問コーナーを開く</a></p>
    </footer>

    <!-- 質問コーナー -->
    <div class="modal-overlay" id="qaModal">
        <div class="modal-content">
            <span onclick="closeQA()" style="position:absolute; top:20px; right:20px; cursor:pointer;">× 閉じる</span>
            <h2>質問コーナー</h2>
            <p>準備中...</p>
        </div>
    </div>

    <script>
        // メニューの開閉
        function toggleMenu() {
            const overlay = document.getElementById('menuOverlay');
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            } else {
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        }
        function openQA() { document.getElementById('qaModal').style.display = 'flex'; }
        function closeQA() { document.getElementById('qaModal').style.display = 'none'; }
    </script>
</body>
</html>
