<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ウィルザ公式サイト | WIRZA OFFICIAL SITE</title>
    <meta name="description" content="マイクラ実況者「ウィルザ」の公式サイト。最新のアドオン配布、ライブスケジュール、イベント情報をチェック！">
    <meta property="og:title" content="ウィルザ公式サイト | WIRZA OFFICIAL SITE">
    <meta property="og:image" content="https://wirza604.github.io/wirza/favicon.png"> 

    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #ffffff; color: #000000; font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* ヘッダー */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 30px; position: sticky; top: 0; background: white; 
            z-index: 150; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        /* 画像に基づいたブランドチップ */
        .brand-chip {
            display: flex; align-items: center; gap: 8px;
            background-color: #374151; color: #ffffff;
            padding: 6px 12px; border-radius: 20px;
            font-size: 14px; font-weight: bold; text-decoration: none;
            transition: 0.3s;
        }
        .brand-chip:hover { background-color: #4b5563; }
        .brand-chip i.fa-globe { font-size: 16px; opacity: 0.8; }
        .brand-chip .close-icon { font-size: 12px; margin-left: 4px; opacity: 0.6; cursor: pointer; }

        .menu-btn { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 200; }
        .menu-btn .line { width: 100%; height: 3px; background-color: #000; transition: 0.3s; }

        /* スクロールアニメーション設定 */
        .reveal {
            opacity: 0;
            transform: translateX(100px); /* 右側から */
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* セクション設定（左に1cm = 約38pxの間隔を保持） */
        section { 
            width: 100%; padding: 100px 0; 
            display: flex; flex-direction: column; 
            align-items: flex-start; /* 左揃え */
            padding-left: 1cm; /* 左に1cmの間隔 */
            margin-bottom: 40px;
            box-sizing: border-box;
        }

        .section-header { width: 90%; max-width: 1200px; margin-bottom: 60px; }
        .section-title-large { font-size: clamp(40px, 10vw, 65px); font-weight: 900; font-style: italic; line-height: 1; margin: 0; }
        
        /* 背景色 */
        .bg-red { background-color: #ff0000; color: #fff; }
        .bg-purple { background-color: #800080; color: #fff; }
        .bg-green { background-color: #2e8b57; color: #fff; }
        .bg-orange { background-color: #ff8c00; color: #fff; }
        .bg-yellow { background-color: #ffd700; color: #000; }
        .bg-blue { background-color: #1e4185; color: #fff; }
        .bg-white { background-color: #ffffff; color: #000; border-top: 1px solid #eee; }

        .content-area { width: 90%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; }
        .card { aspect-ratio: 16 / 9; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; transition: 0.3s; color: inherit; text-decoration: none; }
        .card:hover { transform: translateY(-10px); color: #ff0000 !important; border-color: #ff0000; }

        /* オーバーレイメニュー */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 500; }
        .overlay.show { display: flex; }
        .menu-item { color: #fff; text-decoration: none; font-size: 24px; margin: 15px; display: block; text-align: center; }

        /* フッター */
        footer { background-color: #000; color: #fff; padding: 100px 1cm; margin-top: 40px; }
        .footer-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-column ul { list-style: none; padding: 0; }
        .footer-column ul li a { color: #fff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand-chip">
            <i class="fa-solid fa-globe"></i>
            <span>ウィルザ</span>
            <i class="fa-solid fa-xmark close-icon"></i>
        </a>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="line"></div><div class="line"></div><div class="line"></div>
        </div>
    </header>

    <div class="overlay" id="menuOverlay">
        <nav>
            <a href="#live" class="menu-item" onclick="toggleMenu()">LIVE</a>
            <a href="#video" class="menu-item" onclick="toggleMenu()">VIDEO</a>
            <a href="#download" class="menu-item" onclick="toggleMenu()">DOWNLOAD</a>
            <a href="#terms" class="menu-item" onclick="toggleMenu()">TERMS</a>
        </nav>
    </div>

    <main>
        <section id="live" class="bg-red reveal">
            <div class="section-header"><h2><span style="display:block; font-size:16px;">ライブ配信</span><span class="section-title-large">LIVE</span></h2></div>
            <div class="content-area"><a href="#" class="card">LIVE 1</a><a href="#" class="card">LIVE 2</a></div>
        </section>

        <section id="video" class="bg-purple reveal">
            <div class="section-header"><h2><span style="display:block; font-size:16px;">動画</span><span class="section-title-large">VIDEO</span></h2></div>
            <div class="content-area"><a href="#" class="card">人気動画</a><a href="#" class="card">最新動画</a></div>
        </section>

        <section id="download" class="bg-green reveal">
            <div class="section-header"><h2><span style="display:block; font-size:16px;">配布物</span><span class="section-title-large">DOWNLOAD</span></h2></div>
            <div class="content-area"><a href="#" class="card">アドオン配布</a><a href="#" class="card">ワールド配布</a></div>
        </section>

        <section id="terms" class="bg-white reveal">
            <div class="section-header"><h2><span style="display:block; font-size:16px;">法的情報</span><span class="section-title-large">TERMS</span></h2></div>
            <div style="max-width: 800px; line-height: 1.8;">
                <h3>利用規約</h3>
                <p>二次配布や無断転載は禁止です。動画配信での使用は大歓迎です！</p>
                <h3>プライバシーポリシー</h3>
                <p>当サイトではアクセス解析のためにCookieを使用することがあります。</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-column">
                <h4>SNS</h4>
                <ul>
                    <li><a href="#"><i class="fab fa-youtube"></i> YouTube</a></li>
                    <li><a href="#"><i class="fab fa-x-twitter"></i> X (Twitter)</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h4>LEGAL</h4>
                <ul>
                    <li><a href="#terms">利用規約</a></li>
                    <li><a href="#terms">プライバシーポリシー</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        // メニュー開閉
        function toggleMenu() {
            const overlay = document.getElementById('menuOverlay');
            overlay.classList.toggle('show');
        }

        // スクロールで右からふわっと出す処理
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal(); // 初期表示チェック
    </script>
</body>
</html>
