<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ 公式サイト</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
        }

        .site-title {
            font-size: 24px;
            font-weight: bold;
        }

        /* 三本線ボタン */
        .menu-btn {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .menu-btn .line {
            width: 100%;
            height: 3px;
            background-color: #000000;
        }

        /* 全画面メニュー（オーバーレイ） */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            
            /* 0.5秒でふわっと出す設定 */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        /* メニューが開いた時 */
        .overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* 閉じるボタン（右上） */
        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 50px;
            color: #ffffff;
            cursor: pointer;
            line-height: 1;
        }

        .menu-content {
            text-align: center;
        }

        /* メニュー項目：基本は白、ホバーで赤 */
        .menu-item {
            display: block;
            color: #ffffff;
            text-decoration: none;
            font-size: 32px;
            font-weight: bold;
            margin: 25px 0;
            transition: color 0.3s ease;
        }

        .menu-item:hover {
            color: #ff0000;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        .video-box {
            width: 80%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            border: 4px solid #000000;
            background-color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888888;
        }
    </style>
</head>
<body>

    <header>
        <div class="site-title">ウィルザ公式サイト</div>
        <div class="menu-btn" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </header>

    <div class="overlay" id="overlay">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        
        <div class="menu-content">
            <a href="#" class="menu-item">ライブ</a>
            <a href="event.html" class="menu-item">イベント</a>
            <a href="https://www.youtube.com/@wirza604" class="menu-item" target="_blank">動画</a>
            <a href="#" class="menu-item">スケジュール</a>
            <a href="#" class="menu-item">視聴者参加型</a>
        </div>
    </div>

    <main>
        <div class="video-box">ここに動画を配置</div>
    </main>

    <script>
        function toggleMenu() {
            const overlay = document.getElementById('overlay');
            overlay.classList.toggle('open');
        }
    </script>
</body>
</html>
