<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ (Wirza) 公式サイト | マイクラ実況・ダウンロード・質問コーナー</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* スタイルは前回の「ゆったり設定」を維持 */
        html { scroll-behavior: smooth; }
        body { background-color: #ffffff; color: #000000; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; position: sticky; top: 0; background: white; z-index: 50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .site-title { font-size: 24px; font-weight: bold; }
        .site-title a { text-decoration: none; color: #000; }

        section { width: 100%; padding: 150px 0 100px 0; display: flex; flex-direction: column; align-items: center; }
        .section-header { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; }
        .section-title-large { font-size: clamp(40px, 10vw, 65px); font-weight: 900; font-style: italic; line-height: 1; margin: 0; }
        .section-title-sub { font-size: 18px; font-weight: bold; display: block; }

        .content-area { width: 90%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .card { aspect-ratio: 16 / 9; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; text-decoration: none; color: inherit; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.3); }

        .bg-red { background-color: #ff0000; color: #fff; }
        .bg-purple { background-color: #800080; color: #fff; }
        .bg-green { background-color: #2e8b57; color: #fff; }
        .bg-orange { background-color: #ff8c00; color: #fff; }

        .top-video { width: 98%; max-width: 1400px; aspect-ratio: 16 / 9; border: 6px solid #000; background: #000; margin: 20px auto 50px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* モーダル関連 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background-color: #1a1a1a; width: 90%; max-width: 800px; height: 80%; border-radius: 15px; padding: 40px; color: #fff; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }

        footer { background-color: #000; color: #fff; padding: 80px 20px; margin-top: 100px; }
        .footer-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-sns { display: flex; gap: 20px; font-size: 28px; }
        .footer-sns a { color: #fff; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <h1 class="site-title"><a href="#">WIRZA OFFICIAL SITE</a></h1>
    </header>

    <main>
        <div class="top-video">
            <iframe src="https://www.youtube.com/embed/videoseries?list=UUv0uU7G0nS85Y2aN4P0o4rA" title="YouTube"></iframe>
        </div>

        <!-- 1. LIVE セクション -->
        <section id="live" class="bg-red">
            <div class="section-header">
                <h2><span class="section-title-sub">ライブ配信</span><span class="section-title-large">LIVE</span></h2>
            </div>
            <div class="content-area">
                <div class="card">最新ライブ1</div>
                <div class="card">最新ライブ2</div>
            </div>
        </section>

        <!-- 2. VIDEO セクション (復活) -->
        <section id="video" class="bg-purple">
            <div class="section-header">
                <h2><span class="section-title-sub">おすすめ動画</span><span class="section-title-large">VIDEO</span></h2>
            </div>
            <div class="content-area">
                <div class="card">人気動画1</div>
                <div class="card">人気動画2</div>
            </div>
        </section>

        <!-- 3. DOWNLOAD セクション (旧PACKから変更) -->
        <section id="download" class="bg-green">
            <div class="section-header">
                <h2><span class="section-title-sub">アドオン・配布物</span><span class="section-title-large">DOWNLOAD</span></h2>
            </div>
            <div class="content-area">
                <div class="card">アドオン1</div>
                <div class="card">ワールド配布1</div>
            </div>
        </section>

        <!-- 4. SCHEDULE セクション (復活) -->
        <section id="schedule" class="bg-orange">
            <div class="section-header">
                <h2><span class="section-title-sub">配信スケジュール</span><span class="section-title-large">SCHEDULE</span></h2>
            </div>
            <div class="content-area">
                <div class="card">今週の予定</div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-column">
                <h4>CONTENTS</h4>
                <ul>
                    <li><a href="#live">LIVE / ライブ</a></li>
                    <li><a href="#video">VIDEO / 動画</a></li>
                    <li><a href="#download">DOWNLOAD / ダウンロード</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h4>SUPPORT</h4>
                <ul>
                    <li><a onclick="openQA()">QA / 質問コーナー</a></li>
                    <li><a href="#schedule">SCHEDULE / 日程</a></li>
                </ul>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 50px; border-top: 1px solid #333; padding-top: 30px;">
            <div style="font-size: 32px; font-weight: 900;">WIRZA</div>
            <div class="footer-sns">
                <a href="https://www.youtube.com/@wirza-604" target="_blank"><i class="fab fa-youtube"></i></a>
                <a href="https://x.com/Wirza604" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.instagram.com/wirza604/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@wirza604" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>

    <!-- 質問コーナーポップアップ -->
    <div class="modal-overlay" id="qaModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeQA()">&times; 閉じる</span>
            <h2>質問コーナー</h2>
            <div style="border-bottom: 1px solid #333; padding: 15px 0;">
                <div style="color: #ffd700; font-weight: bold;">質問お待ちしています！</div>
                <div style="font-size: 14px;">ここに回答が入ります。</div>
            </div>
        </div>
    </div>

    <script>
        function openQA() { document.getElementById('qaModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeQA() { document.getElementById('qaModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
