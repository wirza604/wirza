    <style>
        /* 全体設定 */
        html { scroll-behavior: smooth; }
        body { background-color: #ffffff; color: #000000; font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* ヘッダー */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; position: sticky; top: 0; background: white; z-index: 50; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .site-title a { text-decoration: none; color: #000; }

        /* ハンバーガーメニュー */
        .menu-btn { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-btn .line { width: 100%; height: 3px; background-color: #000000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: opacity 0.5s ease; }
        .overlay.open { display: flex; opacity: 1; }
        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 60px; color: #ffffff; cursor: pointer; line-height: 1; }
        .menu-item { display: block; color: #ffffff; text-decoration: none; font-size: 32px; font-weight: bold; margin: 25px 0; transition: color 0.3s; }
        .menu-item:hover { color: #ff0000; }

        /* セクション（余白を広く調整） */
        section { width: 100%; padding: 150px 0 100px 0; display: flex; flex-direction: column; align-items: center; }
        .section-header { width: 90%; max-width: 1200px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px; }
        .section-title-large { font-size: clamp(40px, 10vw, 65px); font-weight: 900; font-style: italic; line-height: 1; margin: 0; }
        .section-title-sub { font-size: 18px; font-weight: bold; margin-bottom: 5px; display: block; }
        
        .view-all-btn { background-color: #ffffff; color: #000000; border: none; cursor: pointer; font-size: 13px; font-weight: bold; padding: 12px 25px; border-radius: 25px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* コンテンツエリア（カードの間隔を広く調整） */
        .content-area { width: 90%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .card { aspect-ratio: 16 / 9; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; text-decoration: none; color: inherit; transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.25); }

        /* 背景色バリエーション */
        .bg-red { background-color: #ff0000; color: #fff; }
        .bg-purple { background-color: #800080; color: #fff; }
        .bg-green { background-color: #2e8b57; color: #fff; }

        /* 動画エリア */
        .top-video { width: 98%; max-width: 1400px; aspect-ratio: 16 / 9; border: 6px solid #000; background: #000; margin: 20px auto 50px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 質問コーナー用ポップアップ（モーダル） */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background-color: #1a1a1a; width: 90%; max-width: 800px; height: 80%; border-radius: 15px; position: relative; padding: 40px; color: #fff; overflow-y: auto; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; }
        .comment-item { border-bottom: 1px solid #333; padding: 15px 0; }
        .comment-user { font-weight: bold; color: #ffd700; margin-bottom: 5px; }

        /* フッター */
        footer { background-color: #000; color: #fff; padding: 80px 20px; width: 100%; box-sizing: border-box; margin-top: 100px; }
        .footer-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; }
        .footer-column h4 { font-size: 18px; margin-bottom: 15px; border-left: 4px solid #fff; padding-left: 10px; }
        .footer-column ul { list-style: none; padding: 0; margin: 0; }
        .footer-column ul li { margin-bottom: 10px; }
        .footer-column ul li a { color: #ccc; text-decoration: none; cursor: pointer; font-size: 14px; transition: color 0.3s; }
        .footer-column ul li a:hover { color: #fff; text-decoration: underline; }
        
        .footer-bottom { border-top: 1px solid #333; margin-top: 50px; padding-top: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .footer-logo { font-size: 32px; font-weight: 900; }
        .footer-sns { display: flex; gap: 20px; font-size: 28px; }
        .footer-sns a { color: #fff; text-decoration: none; transition: transform 0.3s; }
        .footer-sns a:hover { transform: translateY(-5px); color: #ff0000; }
    </style>
</head>
