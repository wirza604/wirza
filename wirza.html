<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウィルザ 公式サイト</title>
    <style>
        /* 全体の見た目 */
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ヘッダー：左にタイトル、右にメニュー */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 三本線ボタン（黒い四角） */
        .menu-button {
            width: 44px;
            height: 44px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: none;
        }
        .menu-line {
            width: 28px;
            height: 3px;
            background-color: #fff;
        }

        /* --- メニュー画面（オーバーレイ） --- */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95); /* 真っ黒な背景 */
            display: none; /* 最初は隠す */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .menu-content {
            border: 3px solid #fff;
            padding: 40px;
            text-align: center;
            width: 85%;
            max-width: 400px;
        }

        .menu-item {
            display: block;
            text-decoration: none;
            font-size: 36px;
            font-weight: bold;
            margin: 25px 0;
            transition: 0.2s;
            cursor: pointer;
        }
        
        /* 文字色の指定 */
        .live { color: #ff0000; }        /* ライブは赤 */
        .yellow-item { color: #ffff00; } /* イベント・動画・スケジュールは黄 */

        .menu-item:hover { opacity: 0.7; }

        .close-btn {
            color: #888;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
            font-size: 18px;
        }

        /* --- 中央の動画配置エリア --- */
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            padding: 20px;
        }

        .video-placeholder {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 16 / 9;
            border: 5px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        .placeholder-text {
            font-size: 20px;
            font-weight: bold;
            color: #999;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">ウィルザ</div>
        <div class="menu-button" onclick="openMenu()">
            <div class="menu-line"></div>
            <div class="menu-line"></div>
            <div class="menu-line"></div>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-content">
            <div class="menu-item live">ライブ</div>
            <a href="event.html" class="menu-item yellow-item">イベント</a>
            <a href="https://www.youtube.com/channel/UCiNHIl4z-vZQzIDlnpjd5yw" class="menu-item yellow-item" target="_blank">動画</a>
            <div class="menu-item yellow-item">スケジュール</div>
            <div class="close-btn" onclick="closeMenu()">× 閉じる</div>
        </div>
    </div>

    <main>
        <div class="video-placeholder">
            <div class="placeholder-text">ここに動画を配置</div>
        </div>
    </main>

    <script>
        // メニューの開閉スイッチ
        function openMenu() {
            document.getElementById('menuOverlay').style.display = 'flex';
        }
        function closeMenu() {
            document.getElementById('menuOverlay').style.display = 'none';
        }
    </script>

</body>
</html>
